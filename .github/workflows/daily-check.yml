name: Domain Availability Check

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  check-availability:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Generate domain list
        run: node src/cli/generate-domain-list.js

      - name: Estimate scan time
        run: node src/cli/estimate-scan-time.js

      - name: Check availability
        run: node src/cli/scan-availability.js

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/results/ data/
          git diff --staged --quiet || git commit -m "bot: domain availability results $(date -u +%Y-%m-%d)"
          git push
