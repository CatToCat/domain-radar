name: Notify Short Domains

on:
  # NOTE: Disabled automatic trigger during the v3 refactor. The notifier still
  # expects the legacy result format; re-enable the workflow_run trigger once it
  # is adapted to the new { domain, price } output. Manual runs only for now.
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Ensure issue label exists
        run: gh label create domain-alert --color FF6B6B --description "Available short domain alert" --force
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify short domains
        run: node src/cli/notify-short-domains.js
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Assign the issue to the repo owner so they get a GitHub notification
          # (you are never notified about issues you create yourself, and the
          # author here is github-actions[bot]).
          ISSUE_ASSIGNEE: ${{ github.repository_owner }}
