name: Notify Short Domains

on:
  # Run automatically after the daily availability check finishes successfully.
  workflow_run:
    workflows: ["Domain Availability Check"]
    types:
      - completed
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    # When triggered by workflow_run, only proceed if the upstream run succeeded.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Ensure issue label exists
        run: gh label create domain-alert --color FF6B6B --description "Available short domain alert" --force
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify short domains
        run: node src/cli/notify-short-domains.js
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
