name: Update TLD Cache

on:
  schedule:
    - cron: '0 3 1 * *'
  workflow_dispatch:

jobs:
  update-cache:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Update TLD cache
        run: node src/cli/update-tld-cache.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tld-cache.json
          git diff --staged --quiet || git commit -m "bot: update TLD cache $(date -u +%Y-%m-%d)"
          git push
