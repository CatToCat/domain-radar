# Domain Radar v3 configuration.
#
# Strategy: enumerate short SLDs (digits + letters) under the 3-character TLDs
# that Cloudflare Registrar supports for PROGRAMMATIC registration, then confirm
# real availability + price via Cloudflare's domain-check API. Only registerable
# ("available") domains are kept.

sld:
  minLength: 2    # skip 1-char SLDs (registries almost always reserve them)
  maxLength: 3    # enumerate SLDs up to this many characters
  mode: mixed     # digits | alpha | mixed (mixed = a-z 0-9, 36 chars)

tld:
  length: 3       # only include TLDs with exactly this many characters

scanner:
  dnsConcurrency: 50          # parallel DNS pre-filter lookups
  cloudflareConcurrency: 3    # parallel Cloudflare domain-check batches
  cloudflareBatchSize: 20     # domains per domain-check request (CF max is 20)
  cloudflareDelay: 200        # delay between Cloudflare batches (ms)

  # Sharding: a scan run processes at most this many shards, where each shard is
  # one (TLD, SLD-length) pair. Progress is tracked in data/scan-progress.json so
  # successive runs continue where the last left off. Set to 0 to run all shards
  # in a single pass.
  shardsPerRun: 0
