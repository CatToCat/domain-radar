sld:
  length: 2
  minLength: 2    # skip SLDs shorter than this (1-char domains are almost always registry-reserved)
  mode: mixed     # digits | alpha | mixed

tld:
  length: 10      # max TLD length to include (CF-supported TLDs range up to ~9 chars)

# TLDs to scan. Restricted to extensions Cloudflare supports for PROGRAMMATIC
# registration, so that the Cloudflare domain-check stage can authoritatively
# confirm whether each domain is registerable. See data/tld-policy.json.
# Editing this list: only add TLDs present in tld-policy.json "supported".
tlds:
  - com
  - org
  - net
  - app
  - dev
  - cc
  - xyz
  - info
  - cloud
  - studio
  - live
  - link
  - pro
  - tech
  - fyi
  - shop
  - online
  - tools
  - run
  - games
  - build
  - systems
  - world
  - news
  - site
  - network
  - chat
  - space
  - family
  - page
  - life
  - group
  - email
  - solutions
  - day
  - blog
  - ing
  - icu
  - academy
  - today

scanner:
  dnsConcurrency: 50
  rdapConcurrency: 20
  whoisConcurrency: 10
  whoisDelay: 500
  whoisRetries: 3
  cloudflareConcurrency: 3   # parallel Cloudflare domain-check batches (Stage 4)
  cloudflareBatchSize: 20    # domains per domain-check request (CF max is 20)
  cloudflareDelay: 200       # delay between Cloudflare batches (ms)
